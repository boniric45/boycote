<div class="global-wrapper">
  @if(isCookiesIsNotSaved()){
  <div class="overlay">
    <div class="cookies">
      <app-cookies></app-cookies>
    </div>
  </div>
  }
  @if (construction) {
  <app-construction (exit)="exitConstruction()"></app-construction>
  } @else {

  @if (showLayout) {
  <app-header></app-header>
  }
  @if (showHost) {
  <app-carousel-host></app-carousel-host>
  }
  <router-outlet></router-outlet>

  @if (showLayout) {
  <app-footer></app-footer>
  }
  }

</div>
