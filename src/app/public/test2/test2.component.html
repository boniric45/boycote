<div class="scene">
  @for (i of [0,1,2,3,4,5,6]; track i) {
    <div class="card" #card (click)="onCardClick(i)">
      <div class="card-num"></div>
      <img src="" alt="" />
      <div class="sold-overlay" style="display:none">
        <div class="sold-label">SOLD OUT</div>
      </div>
    </div>
  }
</div>

<div class="infos">
  <p class="nom">{{ current.nom }}</p>

  @if (current.soldOut) {
    <button class="btn btn-sourcing" (click)="openSourcing.emit(current)">
      <span>REQUEST SOURCING</span>
    </button>
  } @else {
    <button class="btn btn-cart" (click)="addToCart.emit(current)">
      <span>ADD TO CART</span>
    </button>
  }
</div>

<div class="navs">
  <button class="nav" (click)="go(-1)">
    <svg width="20" height="20" viewBox="0 0 22 22" fill="none">
      <path d="M14 5L8 11L14 17" stroke="#444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button class="nav" (click)="go(1)">
    <svg width="20" height="20" viewBox="0 0 22 22" fill="none">
      <path d="M8 5L14 11L8 17" stroke="#444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>
