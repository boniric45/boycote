<div class="titleCarousel" style="text-align: center; color: red; font-size: 24px;">
  <h1>Carousel Test</h1>
</div>

<div class="carousel-wrapper">

  <div class="carousel">

    <button class="nav left desktop" (click)="prev()">
      <app-component-left></app-component-left>
    </button>
   
    <div class="items"
         [class.animating]="isAnimating"
         [class.left-direction]="direction === 'left'">

         @if(visibleArticles.length > 0){
              @for (article of visibleArticles;track trackByArticle($index,article); let i = $index) {
                <img
                  [src]="article.pathpictureone"
                  class="item"
                  [style.transform]="getTransform(i)"
                  [style.zIndex]="getZIndex(i)"
                  [style.opacity]="getOpacity(i)"
                />
              }
         }


    </div>

    <button class="nav right desktop" (click)="next()">
      <app-component-right></app-component-right>
    </button>

  </div>

  <div class="nav-mobile mobile">
    <button class="nav" (click)="prev()">
      <app-component-left></app-component-left>
    </button>
    <button class="nav" (click)="next()">
      <app-component-right></app-component-right>
    </button>
  </div>

    </div>
  </div> -->

</div>
