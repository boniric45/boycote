  
  @if (visible) {
    <div class="rotate-overlay">
        <div class="phone-scene">
            <div class="halo"></div>

            <svg class="phone-svg" width="110" height="200" viewBox="0 0 110 200" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="ro-body" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#6b747d" />
                        <stop offset="12%" stop-color="#9ca5ae" />
                        <stop offset="30%" stop-color="#bdc5cc" />
                        <stop offset="50%" stop-color="#d4dbe0" />
                        <stop offset="70%" stop-color="#bdc5cc" />
                        <stop offset="88%" stop-color="#9ca5ae" />
                        <stop offset="100%" stop-color="#6b747d" />
                    </linearGradient>
                    <linearGradient id="ro-screenOff" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#1a2030" />
                        <stop offset="100%" stop-color="#0d1018" />
                    </linearGradient>
                    <radialGradient id="ro-homeBtn" cx="40%" cy="30%" r="70%">
                        <stop offset="0%" stop-color="#d8dde2" />
                        <stop offset="60%" stop-color="#aab2ba" />
                        <stop offset="100%" stop-color="#7a8490" />
                    </radialGradient>
                    <linearGradient id="ro-chrome" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#e8ecef" />
                        <stop offset="50%" stop-color="#a0a8b0" />
                        <stop offset="100%" stop-color="#c8cdd2" />
                    </linearGradient>
                    <clipPath id="ro-screenClip">
                        <rect x="14" y="38" width="82" height="124" rx="3" />
                    </clipPath>
                    <filter id="ro-bloom">
                        <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur" />
                        <feMerge>
                            <feMergeNode in="blur" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                </defs>

                <rect x="2" y="2" width="106" height="196" rx="16" fill="url(#ro-body)" />
                <rect x="2" y="2" width="106" height="196" rx="16" fill="none" stroke="url(#ro-chrome)"
                    stroke-width="1.5" />
                <rect x="2" y="20" width="3" height="160" rx="1.5" fill="rgba(255,255,255,0.25)" />

                <rect x="14" y="38" width="82" height="124" rx="3" fill="url(#ro-screenOff)" />

                <rect x="14" y="38" width="82" height="124" rx="3" fill="white" filter="url(#ro-bloom)"
                    clip-path="url(#ro-screenClip)">
                    <animate attributeName="opacity" values="0;0;1;1;1;0;0;0;0"
                        keyTimes="0;0.18;0.52;0.58;0.78;0.88;0.92;0.97;1" dur="2.8s" repeatCount="indefinite"
                        calcMode="spline" keySplines="
              0.4 0 0.6 1;
              0.4 0 0.6 1;
              0 0 0.1 1;
              0.4 0 0.6 1;
              0.4 0 0.6 1;
              0 0.8 0.2 1;
              0.4 0 0.6 1;
              0.4 0 0.6 1
            " />
                </rect>

                <rect x="36" y="18" width="38" height="6" rx="3" fill="#3a3f45" />
                <rect x="36" y="18" width="38" height="2.5" rx="1.5" fill="rgba(255,255,255,0.15)" />

                <circle cx="80" cy="21" r="3.5" fill="#2a2e33" />
                <circle cx="80" cy="21" r="2" fill="#1a1d22" />
                <circle cx="79" cy="20" r="0.7" fill="rgba(255,255,255,0.4)" />

                <circle cx="55" cy="177" r="10" fill="url(#ro-homeBtn)" />
                <circle cx="55" cy="177" r="10" fill="none" stroke="#7a8490" stroke-width="1" />
                <rect x="51" y="173" width="8" height="8" rx="1.8" fill="none" stroke="#8a9098" stroke-width="1.3" />
                <ellipse cx="53" cy="174.5" rx="3.5" ry="2" fill="rgba(255,255,255,0.3)" />

                <rect x="74" y="0" width="16" height="5" rx="2.5" fill="#8a9098" />
                <rect x="74" y="0" width="16" height="2" rx="1.5" fill="rgba(255,255,255,0.2)" />

                <rect x="0" y="68" width="3" height="20" rx="1.5" fill="#7a8490" />
                <rect x="0" y="94" width="3" height="20" rx="1.5" fill="#7a8490" />

                <circle cx="28" cy="198" r="3" fill="#2a2e33" />
                <rect x="38" y="196" width="34" height="4" rx="2" fill="#2a2e33" />
                <rect x="40" y="197" width="30" height="2" rx="1" fill="rgba(255,255,255,0.08)" />
            </svg>
        </div>
    </div>
    }
