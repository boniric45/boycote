<div class="select-wrapper">

  @if(isRefreshActive()){

  <button class="btn-refresh" (click)="onRefresh()">

    <svg class="imgSearchRefresh" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 12a9 9 0 0 1 9-9 9 9 0 0 1 6.36 2.64L21 8" stroke="#555555" stroke-width="2.2"
        stroke-linecap="round" />
      <path d="M21 3v5h-5" stroke="#555555" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M21 12a9 9 0 0 1-9 9 9 9 0 0 1-6.36-2.64L3 16" stroke="#555555" stroke-width="2.2"
        stroke-linecap="round" />
      <path d="M3 21v-5h5" stroke="#555555" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>
  }

  <!-- MARQUES -->
  <div class="mac-select-wrapper" (click)="onFocus()">
    <div class="mac-select-btn" [class.open]="isOpenMarques()" (click)="toggleMarquesDropdown($event)">
      <span class="mac-select-label">BRANDS</span>
      <span class="mac-chevron">▼</span>
    </div>

    <div class="mac-dropdown" [class.open]="isOpenMarques()" (click)="$event.stopPropagation()">
      @for (m of marques; track m.id) {
      <div class="mac-option" [class.selected]="selectedMarques().includes(m.name)"
        (click)="toggleMarque(m.name, $event)">
        <div class="mac-checkbox" [class.checked]="selectedMarques().includes(m.name)"></div>
        <span class="mac-option-label">{{ m.name }}</span>
      </div>
      }
    </div>
  </div>

  <!-- TYPES -->
  <div class="mac-select-wrapper" (click)="onFocus()">
    <div class="mac-select-btn" [class.open]="isOpenTypes()" (click)="toggleTypesDropdown($event)">
      <span class="mac-select-label">TYPES</span>
      <span class="mac-chevron">▼</span>
    </div>

    <div class="mac-dropdown" [class.open]="isOpenTypes()" (click)="$event.stopPropagation()">
      @for (t of types; track t.id) {
      <div class="mac-option" [class.selected]="selectedTypes().includes(t.name)" (click)="toggleType(t.name, $event)">
        <div class="mac-checkbox" [class.checked]="selectedTypes().includes(t.name)"></div>
        <span class="mac-option-label">{{ t.name }}</span>
      </div>
      }
    </div>
  </div>

  <!-- GENDERS -->
  <div class="mac-select-wrapper" (click)="onFocus()">
    <div class="mac-select-btn" [class.open]="isOpenGenders()" (click)="toggleGendersDropdown($event)">
      <span class="mac-select-label">GENDERS</span>
      <span class="mac-chevron">▼</span>
    </div>

    <div class="mac-dropdown" [class.open]="isOpenGenders()" (click)="$event.stopPropagation()">
      @for (g of genders; track g.id) {
      <div class="mac-option" [class.selected]="selectedGenders().includes(g.name)"
        (click)="toggleGender(g.name, $event)">
        <div class="mac-checkbox" [class.checked]="selectedGenders().includes(g.name)"></div>
        <span class="mac-option-label">{{ g.name }}</span>
      </div>
      }
    </div>
  </div>


  <div class="select-title">
    <!-- BOUTON DE VALIDATION -->
    <button class="btnSelectSearch" (click)="submitSearchByFilters()">
      <img class="imgSelectSearch" src="pictures/search.png" alt="Search">
    </button>
  </div>


</div>
