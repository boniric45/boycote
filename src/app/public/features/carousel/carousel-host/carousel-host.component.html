<div class="carousel-host">


  @switch (mode()) {
  @case ('standard') {
  <app-carousel-standard />
  }

  @case ('search') {
  @if(searchSubmitted()){
  <app-carousel-input [searchQuery]="searchQuery" [searchSubmitted]="searchSubmitted()" />
  }
  }

  @case ('select') {
  <app-carousel-select [articles]="filteredArticles"/>
  }

  @case ('product') {
  <app-carousel-product />
  }

  }

</div>
