
<div class="container">

    <img class="imgBack" src="pictures\back.png" [routerLink]="['/home']" alt="Back">

    <img class="img_logo" src="/pictures/logo.png" alt="Logo Boycoté">

    <img class="btn-panier" src="/pictures/shopping.png" alt="panier">
</div>

<div class="wrapper">

    <div class="carousel-wrapper">

    <div class="carousel">

    <button class="nav left desktop" (click)="prev()">
      <app-component-left></app-component-left>
    </button>
   
    <div class="items"
         [class.animating]="isAnimating"
         [class.left-direction]="direction === 'left'">

         @if(visibleArticles.length > 0){
              @for (article of visibleArticles;track $index; let i = $index) {
                <img
                  (click)="readViewProduct(product)"
                  [src]="article"
                  class="item"
                  [style.transform]="getTransform(i)"
                  [style.zIndex]="getZIndex(i)"
                  [style.opacity]="getOpacity(i)"
                />
                <div class="card" (click)="readViewProduct(product)"></div>
              }
         }
    </div>

    <button class="nav right desktop" (click)="next()">
      <app-component-right></app-component-right>
    </button>

        </div>


    <div class="nav-mobile mobile">

        <button class="nav" (click)="prev()">
            <app-component-left></app-component-left>
        </button>

        <button class="nav" (click)="next()">
            <app-component-right></app-component-right>
        </button>

    </div>
        </div>

            <div class="description-product">
                <div class="description">
                    <app-product-card></app-product-card>
                </div>           
            </div>
        </div>

    
<div class="footer">
  <app-footer></app-footer>
</div>
