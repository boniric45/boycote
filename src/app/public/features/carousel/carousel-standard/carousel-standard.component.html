<div class="global-wrapper">
  <div class="global-content">

    <div class="carousel-wrapper">

      <div class="carousel">

        <button class="nav left desktop" (click)="prev()">
          <app-component-left></app-component-left>
        </button>

        <div class="items" (touchstart)="onTouchStart($event)" (touchend)="onTouchEnd($event)"
          [class.animating]="isAnimating" [class.left-direction]="direction === 'left'">

          @if(visibleArticles.length > 0){
          @for (article of visibleArticles;track trackByArticle($index,article); let i = $index) {

          <img (click)="readViewProduct(article)" [src]="article.pathpictureone" class="item"
            [style.transform]="getTransform(i)" [style.zIndex]="getZIndex(i)" [style.opacity]="getOpacity(i)" />
          <!-- <div class="card" (click)="readViewProduct(article)"></div> -->
          }
          }
        </div>

        <button class="nav right desktop" (click)="next()">
          <app-component-right></app-component-right>
        </button>

      </div>

      <div class="container">
        <div class="description">
          @if(centralArticle){
          <a>{{ centralArticle.name }}</a>
          <p>{{ centralArticle.gender}}</p>
          <a> {{ centralArticle.size}}</a>
          <br>
          <span class="price">{{ centralArticle.prix | currency:'EUR'}}</span>
          }
        </div>
      </div>

      <div class="conteneur-bouton">
        <button class="primary" (click)="addToCart(centralArticle)"><span>ADD TO CART</span>
        </button>
      </div>

      <div class="nav-mobile mobile">
        <button class="nav" (click)="prev()">
          <app-component-left></app-component-left>
        </button>
        <button class="nav right" (click)="next()">
          <app-component-right></app-component-right>
        </button>
      </div>

    </div>
  </div>
</div>
