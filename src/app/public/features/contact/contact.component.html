
<div class="container">

<div class="float-wrapper">
  <div class="mac-window">

    <div class="title-bar">
      <span class="title-text">Contact</span>
    </div>

    <div class="card-body">

      <p class="contact-heading">GET IN TOUCH</p>

      <p class="contact-intro">Have a question about an item, authenticity, or your order?</p>

      <div class="divider"></div>

      <div class="info-block">
        <div class="info-row">
          <span class="info-label">Email</span>
          <span class="info-value">{{ email }}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Instagram</span>
          <span class="info-value">{{ instagram }}</span>
          <span class="info-sub">Direct Message for quick questions</span>
        </div>
      </div>

      <div class="divider"></div>

      <p class="contact-note">
        Our customer service is available <strong>Monday to Friday.</strong><br>
        We typically respond within <strong>24–48 hours.</strong>
      </p>

    </div>
  </div>
</div>
</div>
