<!-- BOUTON PANIER -->

<div class="shop-wrapper">

    <div class="key-face">
        <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" fill="none" transform="scale(1.25)">
            <path d="M 28,36 Q 28,18 40,18 Q 52,18 52,36" stroke="#808080" stroke-width="5.5" stroke-linecap="round"
                stroke-linejoin="round" />
            <path d="M 16,36 L 20,62 Q 20,66 24,66 L 56,66 Q 60,66 60,62 L 64,36 Z" stroke="#808080" stroke-width="5.5"
                stroke-linecap="round" stroke-linejoin="round" />
        </svg>

    </div>

    <div class="cart-overlay" (click)="onOverlayClick($event)">
        <div class="cart-window">

            <!-- Barre titre -->
            <div class="title-bar">
                <button class="btn-close-cart" (click)="closeCart()"></button>
                <span class="title-text">My Cart</span>
            </div>

            <!-- Articles -->
            <div class="cart-body">
                <div class="divider"></div>

                <div class="instagram-banner">
                    <p>💡 For a secure, glitch-free payment, open the site in your browser:
                        Click the <strong>three dots (...)</strong> in the top right corner ↗️, then select
                        <strong>"Open in
                            browser"</strong>.
                    </p>
                </div>

            </div>

            <!-- Footer fixe -->
            <div class="cart-footer">

            </div>

        </div>
    </div>
