<!-- ============================
     HEADER MOBILE (disparaît en recherche)
     ============================ -->
<div class="header-wrapper mobile-only">
  @if(!searchOpen()){

  <div class="header">
    @if(isHamburgerEnabled()){
    <!-- HAMBURGER -->
    <div class="header-left" (click)="onHamburgerClick()">
      <app-hamburger></app-hamburger>
    </div>
    }
    @else {
    <div class="header-arrow">
      <app-button-return></app-button-return>
    </div>
    }

    <!-- LOGO -->
    <div class="header-center">
      <img src="/pictures/logo.png" class="img_logo_mobile" alt="Boycoté">
    </div>

    <!-- PANIER -->
    <div class="header-right">
      <app-cart></app-cart>
    </div>

  </div>
  }
</div>


<!-- ============================
     HEADER DESKTOP (toujours visible)
     ============================ -->
<div class="header desktop-only">

  <!-- HAMBURGER -->
  @if(isHamburgerEnabled()){
  <!-- HAMBURGER -->
  <div class="header-left" (click)="onHamburgerClick()">
    <app-hamburger></app-hamburger>
  </div>
  }
  @else {
  <div class="header-arrow">
    <app-button-return></app-button-return>
  </div>
  }


  <!-- LOGO CENTRÉ -->
  <div class="header-center">
    <img src="/pictures/logo.png" class="img_logo_mobile" alt="Boycoté">
  </div>

  <!-- PANIER -->
  <div class="header-right">
    <app-cart></app-cart>
  </div>
</div>

<!-- ============================
     ZONE RECHERCHE (mobile + desktop)
     ============================ -->
<div class="search-zone">
  @if(searchOpen()){

  <div class="search-wrapper">
    <!-- INPUT -->
    @if(inputActive()){
    <app-search-input (focusInput)="onInputFocus()" (searchInput)="onSearchInput($event)" (reset)="resetSearch()">
    </app-search-input>
    }
  </div>

  <!-- SELECTS -->
  @if(selectActive()){
  <app-search-selects (focusSelect)="onSelectFocus()" (searchFilters)="onSearchSelect($event)" (reset)="resetSearch()">
  </app-search-selects>
  }

  }
</div>
