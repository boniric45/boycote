<div class="cabine-container">
  <!-- mannequin -->
  <img class="mannequin-img" src="pictures/mannequin-homme.webp" />

  <!-- vêtement -->
  <div class="outfit-wrapper"
       [style.left.px]="item.x"
       [style.top.px]="item.y"
       [style.width.px]="item.width"
       [style.height.px]="item.height"
       [style.z-index]="item.zIndex"
       cdkDrag
       (cdkDragMoved)="dragItem($event)">
    <img class="outfit-img" [src]="item.src" />
  </div>
</div>
