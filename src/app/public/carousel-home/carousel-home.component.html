<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
</head>


<body>
    
      <div class="container">

        <div class="btnLeft"><app-component-left (outputLeft)="startCarousel($event)"/></div>
           
          @for(product of products;track product.idImage)
          {
         <!-- Fait un champ de recherche sur les marques -->
          <div #carousel__cell class="carousel__cell" [ngStyle]="getStyle(product.idImage)">
          <img class="imgCard" src="/pictures/{{product.idImage}}.png">
          <div class="card"> Id: {{product.idImage}} - {{product.name}} </div>
          </div>
            }
                     
        <div class="btnRight"><app-component-right (outputRight)="startCarousel($event)"/>
        </div>
 

      </div>




</body>


</html>
